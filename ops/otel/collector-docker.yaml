receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    limit_mib: 256
  resource:
    attributes:
      - key: environment
        value: docker
        action: upsert
      - key: deployment
        value: local
        action: upsert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: enterprise_ai_platform
    const_labels:
      environment: docker
      deployment: local
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tenant_id: "docker-local"
    labels:
      attributes:
        service.name: "service_name"
        level: "level"
  logging:
    loglevel: debug

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [jaeger, logging]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki, logging]
  
  telemetry:
    logs:
      level: "debug"
    metrics:
      address: 0.0.0.0:8888