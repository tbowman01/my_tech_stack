openapi: 3.0.3
info:
  title: Enterprise AI Platform API
  description: REST API specification for the Enterprise AI Platform
  version: 0.1.0
  contact:
    name: Platform Team
    email: platform@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://dev-api.example.com/v1
    description: Development server

paths:
  /healthz:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      summary: Readiness check endpoint  
      description: Returns the readiness status of the service
      operationId: readinessCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /users:
    get:
      summary: List users
      description: Get a paginated list of users
      operationId: listUsers
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of users to skip
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create user
      description: Create a new user
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/infer:
    post:
      summary: Generate AI inference
      description: Generate text using AI models
      operationId: generateInference
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
      responses:
        '200':
          description: Inference generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/embed:
    post:
      summary: Generate embeddings
      description: Generate vector embeddings for text
      operationId: generateEmbedding
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingRequest'
      responses:
        '200':
          description: Embeddings generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, ready]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
        version:
          type: string
      required:
        - status
        - timestamp
        - service
        - version

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - created_at

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
      required:
        - name
        - email

    ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
      required:
        - users
        - total
        - limit
        - offset

    InferenceRequest:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000
        model:
          type: string
          default: "default"
        max_tokens:
          type: integer
          minimum: 1
          maximum: 2048
          default: 100
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
          default: 0.7
      required:
        - prompt

    InferenceResponse:
      type: object
      properties:
        response:
          type: string
        model:
          type: string
        tokens_used:
          type: integer
        inference_time_ms:
          type: number
        request_id:
          type: string
      required:
        - response
        - model
        - tokens_used
        - inference_time_ms
        - request_id

    EmbeddingRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 10000
        model:
          type: string
          default: "default"
      required:
        - text

    EmbeddingResponse:
      type: object
      properties:
        embedding:
          type: array
          items:
            type: number
        model:
          type: string
        dimension:
          type: integer
        request_id:
          type: string
      required:
        - embedding
        - model
        - dimension
        - request_id

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time
        details:
          type: object
      required:
        - error
        - statusCode
        - timestamp

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health and readiness checks
  - name: Users
    description: User management operations
  - name: AI
    description: AI inference and embedding operations