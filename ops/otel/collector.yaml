apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: observability
spec:
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
          thrift_compact:
            endpoint: 0.0.0.0:6831
      zipkin:
        endpoint: 0.0.0.0:9411
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 10s
              static_configs:
                - targets: ['0.0.0.0:8888']

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
        send_batch_max_size: 2048
      memory_limiter:
        limit_mib: 512
      resource:
        attributes:
          - key: environment
            value: ${OTEL_ENVIRONMENT}
            action: upsert
          - key: cluster
            value: ${OTEL_CLUSTER}
            action: upsert
      attributes:
        actions:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: insert
          - key: service.pod
            from_attribute: k8s.pod.name
            action: insert

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: enterprise_ai_platform
        const_labels:
          environment: ${OTEL_ENVIRONMENT}
          cluster: ${OTEL_CLUSTER}
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      loki:
        endpoint: http://loki:3100/loki/api/v1/push
        tenant_id: "enterprise-ai-platform"
        labels:
          attributes:
            service.name: "service_name"
            service.namespace: "service_namespace"
            level: "level"
      jaeger:
        endpoint: jaeger-collector:14250
        tls:
          insecure: true
      logging:
        loglevel: info

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp, jaeger, zipkin]
          processors: [memory_limiter, resource, attributes, batch]
          exporters: [otlp/tempo, jaeger, logging]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheus, logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, attributes, batch]
          exporters: [loki, logging]
      
      telemetry:
        logs:
          level: "info"
        metrics:
          address: 0.0.0.0:8888
  
  replicas: 3
  
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  env:
    - name: OTEL_ENVIRONMENT
      value: "dev"
    - name: OTEL_CLUSTER
      value: "enterprise-ai-platform-dev"

  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: jaeger-grpc
      port: 14250
      targetPort: 14250
    - name: jaeger-thrift-http
      port: 14268
      targetPort: 14268
    - name: jaeger-thrift-compact
      port: 6831
      targetPort: 6831
      protocol: UDP
    - name: zipkin
      port: 9411
      targetPort: 9411
    - name: prometheus
      port: 8889
      targetPort: 8889
    - name: internal-metrics
      port: 8888
      targetPort: 8888
    - name: health
      port: 13133
      targetPort: 13133

  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"
  
  nodeSelector:
    kubernetes.io/os: linux