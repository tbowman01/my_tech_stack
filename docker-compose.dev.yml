# Enterprise AI Platform - Development Docker Compose
# Minimal setup for local development
version: '3.8'

services:
  # =============================================================================
  # Core Infrastructure for Development
  # =============================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: eai_dev_postgres
    environment:
      POSTGRES_DB: enterprise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - eai_dev_network

  redis:
    image: redis:7-alpine
    container_name: eai_dev_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - eai_dev_network

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: eai_dev_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - eai_dev_network

  # =============================================================================
  # Lightweight Observability
  # =============================================================================

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: eai_dev_jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - eai_dev_network

  # =============================================================================
  # Application Services (Development Mode)
  # =============================================================================

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile.dev
    container_name: eai_dev_api_gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - LOG_LEVEL=debug
      - OTEL_SERVICE_NAME=api-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - USERS_SERVICE_URL=http://users:8080
      - AI_SERVICE_URL=http://ai-inference:8080
    volumes:
      - ./apps/api-gateway/src:/app/src:ro
      - ./apps/api-gateway/package.json:/app/package.json:ro
    depends_on:
      - jaeger
    networks:
      - eai_dev_network

  users:
    build:
      context: ./services/users
      dockerfile: Dockerfile.dev
    container_name: eai_dev_users
    ports:
      - "8081:8080"
    environment:
      - RUST_LOG=debug
      - OTEL_SERVICE_NAME=users
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - DATABASE_URL=postgresql://postgres:dev_password@postgres:5432/users
    volumes:
      - ./services/users/src:/app/src:ro
      - ./services/users/Cargo.toml:/app/Cargo.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eai_dev_network

  ai-inference:
    build:
      context: ./apps/ai/inference
      dockerfile: Dockerfile.dev
    container_name: eai_dev_ai_inference
    ports:
      - "8082:8080"
    environment:
      - PYTHON_ENV=development
      - LOG_LEVEL=debug
      - OTEL_SERVICE_NAME=ai-inference
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./apps/ai/inference:/app:ro
    depends_on:
      - qdrant
      - jaeger
    networks:
      - eai_dev_network

volumes:
  postgres_dev_data:
  redis_dev_data:
  qdrant_dev_data:

networks:
  eai_dev_network:
    driver: bridge